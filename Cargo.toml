[package]
name = "mastodon-spam-checker"
version = "0.1.0"
edition = "2024"
description = "LLM-powered spam detector for Mastodon instances"
license = "MIT"

[dependencies]
anyhow = "1"
dotenvy = "0.15"
redis = { version = "1.3", default-features = false, features = ["tokio-comp"] }
reqwest = { version = "0.13", default-features = false, features = ["json", "http2", "rustls-no-provider"] }
# 暗号バックエンドをデフォルトの aws-lc-rs(C 実装で巨大)から純 Rust の ring に変更
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros"] }
tracing = "0.1"
tracing-subscriber = "0.3"

[profile.release]
lto = true
codegen-units = 1
strip = true
opt-level = "z"
panic = "abort"
